name: Market Alert Engine

on:
  schedule:
    # Runs twice daily: 00:00 UTC (07:00 WIB) & 10:00 UTC (17:00 WIB - post IDX close)
    - cron: '0 0,10 * * *'
  workflow_dispatch: # Enables the manual "Run workflow" button for testing

jobs:
  check-market:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests yfinance pandas

      - name: Run Alert Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_engine.py
